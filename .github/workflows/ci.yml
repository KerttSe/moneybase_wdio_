name: WDIO E2E

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to run
        required: false
        default: all
        type: choice
        options:
          - all
          - android
          - ios

permissions:
  contents: read

jobs:
  e2e:
    name: ${{ matrix.smoke && format('SMOKE ({0})', matrix.platform) || format('E2E ({0})', matrix.platform) }} — ${{ matrix.spec }}
    runs-on: self-hosted
    if: inputs.platform == 'all' || inputs.platform == '' || inputs.platform == matrix.platform || github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: android
            spec: src/tests/launch.spec.ts
            smoke: true
          - platform: ios
            spec: src/tests/launch.spec.ts
            smoke: true
          - platform: android
            spec: src/tests/homeScreen.spec.ts
            smoke: true
          - platform: ios
            spec: src/tests/homeScreen.spec.ts
            smoke: true
          - platform: android
            spec: src/tests/homeAccountSwitch.spec.ts
            smoke: true
          - platform: ios
            spec: src/tests/homeAccountSwitch.spec.ts
            smoke: true
          - platform: android
            spec: src/tests/homeSearch.spec.ts
            smoke: true
          - platform: ios
            spec: src/tests/homeSearch.spec.ts
            smoke: true
          - platform: android
            spec: src/tests/addfunds.spec.ts
            smoke: true
          - platform: ios
            spec: src/tests/addfunds.spec.ts
            smoke: true
          - platform: android
            spec: src/tests/addbeneficiary.individual.spec.ts
            smoke: true
          - platform: ios
            spec: src/tests/addbeneficiary.individual.spec.ts
            smoke: true
          - platform: android
            spec: src/tests/physicalcardcreation.spec.ts
            smoke: true
          - platform: ios
            spec: src/tests/physicalcardcreation.spec.ts
            smoke: true
          - platform: android
            spec: src/tests/cardFreezeUnfreeze.joint.spec.ts
            smoke: true
          - platform: ios
            spec: src/tests/cardFreezeUnfreeze.joint.spec.ts
            smoke: true
          - platform: android
            spec: src/tests/bankTransfer.p2p.individual.spec.ts
            smoke: true
          - platform: ios
            spec: src/tests/bankTransfer.p2p.individual.spec.ts
            smoke: true
          - platform: android
            spec: src/tests/bankTransfer.sepa.individual.spec.ts
            smoke: true
          - platform: ios
            spec: src/tests/bankTransfer.sepa.individual.spec.ts
            smoke: true
          - platform: android
            spec: src/tests/bankTransfer.swift.individual.spec.ts
            smoke: true
          - platform: ios
            spec: src/tests/bankTransfer.swift.individual.spec.ts
            smoke: true
          - platform: android
            spec: src/tests/fxExchange.spec.ts
            smoke: true
          - platform: ios
            spec: src/tests/fxExchange.spec.ts
            smoke: true
          - platform: android
            spec: src/tests/autoTopUp.spec.ts
            smoke: true
          - platform: ios
            spec: src/tests/autoTopUp.spec.ts
            smoke: true
          - platform: android
            spec: src/tests/cashFunds.spec.ts
            smoke: true
          - platform: ios
            spec: src/tests/cashFunds.spec.ts
            smoke: true
          - platform: android
            spec: src/tests/portfolio.spec.ts
            smoke: true
          - platform: ios
            spec: src/tests/portfolio.spec.ts
            smoke: true
          - platform: android
            spec: src/tests/watchlist.spec.ts
            smoke: true
          - platform: ios
            spec: src/tests/watchlist.spec.ts
            smoke: true
          - platform: android
            spec: src/tests/orders.spec.ts
            smoke: true
          - platform: ios
            spec: src/tests/orders.spec.ts
            smoke: true
          - platform: android
            spec: src/tests/priceAlerts.spec.ts
            smoke: true
          - platform: ios
            spec: src/tests/priceAlerts.spec.ts
            smoke: true
          - platform: android
            spec: src/tests/onboarding.spec.ts
            smoke: true
          - platform: ios
            spec: src/tests/onboarding.spec.ts
            smoke: true
    env:
      MB_COUNTRY: ${{ secrets.MB_COUNTRY }}
      MB_PHONE: ${{ secrets.MB_PHONE }}
      MB_PIN: ${{ secrets.MB_PIN }}
      BROWSERSTACK: "true"
      BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
      BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
      BS_APP_ANDROID: ${{ secrets.BS_APP_ANDROID }}
      BS_APP_IOS: ${{ secrets.BS_APP_IOS }}
      PLATFORM: ${{ matrix.platform }}
      BS_BUILD: ${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run wdio -- --spec ${{ matrix.spec }}

      - name: BrowserStack Observability link
        if: always()
        run: |
          echo "### BrowserStack Report" >> $GITHUB_STEP_SUMMARY
          echo "[View on Observability](https://observability.browserstack.com/projects/moneybase_wdio/builds/${{ env.BS_BUILD }})" >> $GITHUB_STEP_SUMMARY
