name: WDIO E2E

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  e2e:
    name: ${{ matrix.smoke && format('SMOKE ({0})', matrix.platform) || format('E2E ({0})', matrix.platform) }} — ${{ matrix.spec }}
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: android
            spec: src/tests/launch.spec.ts
            smoke: true
          - platform: ios
            spec: src/tests/launch.spec.ts
            smoke: true
          - platform: android
            spec: src/tests/homeScreen.spec.ts
            smoke: true
          - platform: ios
            spec: src/tests/homeScreen.spec.ts
            smoke: true
          - platform: android
            spec: src/tests/homeAccountSwitch.spec.ts
            smoke: true
          - platform: ios
            spec: src/tests/homeAccountSwitch.spec.ts
            smoke: true
          - platform: android
            spec: src/tests/homeSearch.spec.ts
            smoke: true
          - platform: ios
            spec: src/tests/homeSearch.spec.ts
            smoke: true
          - platform: android
            spec: src/tests/addfunds.spec.ts
            smoke: true
          - platform: ios
            spec: src/tests/addfunds.spec.ts
            smoke: true
          - platform: android
            spec: src/tests/addbeneficiary.individual.spec.ts
            smoke: true
          - platform: ios
            spec: src/tests/addbeneficiary.individual.spec.ts
            smoke: true
          - platform: android
            spec: src/tests/physicalcardcreation.spec.ts
            smoke: true
          - platform: ios
            spec: src/tests/physicalcardcreation.spec.ts
            smoke: true
          - platform: android
            spec: src/tests/cardFreezeUnfreeze.joint.spec.ts
            smoke: true
          - platform: ios
            spec: src/tests/cardFreezeUnfreeze.joint.spec.ts
            smoke: true
          - platform: android
            spec: src/tests/bankTransfer.p2p.individual.spec.ts
            smoke: true
          - platform: ios
            spec: src/tests/bankTransfer.p2p.individual.spec.ts
            smoke: true
          - platform: android
            spec: src/tests/bankTransfer.sepa.individual.spec.ts
            smoke: true
          - platform: ios
            spec: src/tests/bankTransfer.sepa.individual.spec.ts
            smoke: true
          - platform: android
            spec: src/tests/bankTransfer.swift.individual.spec.ts
            smoke: true
          - platform: ios
            spec: src/tests/bankTransfer.swift.individual.spec.ts
            smoke: true
          - platform: android
            spec: src/tests/fxExchange.spec.ts
            smoke: true
          - platform: ios
            spec: src/tests/fxExchange.spec.ts
            smoke: true
          - platform: android
            spec: src/tests/autoTopUp.spec.ts
            smoke: true
          - platform: ios
            spec: src/tests/autoTopUp.spec.ts
            smoke: true
          - platform: android
            spec: src/tests/cashFunds.spec.ts
            smoke: true
          - platform: ios
            spec: src/tests/cashFunds.spec.ts
            smoke: true
          - platform: android
            spec: src/tests/portfolio.spec.ts
            smoke: true
          - platform: ios
            spec: src/tests/portfolio.spec.ts
            smoke: true
          - platform: android
            spec: src/tests/watchlist.spec.ts
            smoke: true
          - platform: ios
            spec: src/tests/watchlist.spec.ts
            smoke: true
          - platform: android
            spec: src/tests/orders.spec.ts
            smoke: true
          - platform: ios
            spec: src/tests/orders.spec.ts
            smoke: true
          - platform: android
            spec: src/tests/priceAlerts.spec.ts
            smoke: true
          - platform: ios
            spec: src/tests/priceAlerts.spec.ts
            smoke: true
          - platform: android
            spec: src/tests/onboarding.spec.ts
            smoke: true
          - platform: ios
            spec: src/tests/onboarding.spec.ts
            smoke: true
    env:
      MB_COUNTRY: ${{ secrets.MB_COUNTRY }}
      MB_PHONE: ${{ secrets.MB_PHONE }}
      MB_PIN: ${{ secrets.MB_PIN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start Appium
        run: npx appium --base-path / --log-level info &

      - name: Wait for Appium
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:4723/status && break
            sleep 1
          done

      - name: Set artifact name
        id: artifact
        run: |
          spec_name=$(basename "${{ matrix.spec }}" .spec.ts)
          echo "name=allure-${{ matrix.platform }}-${spec_name}" >> $GITHUB_OUTPUT

      - name: Run tests
        run: npm run wdio -- --spec ${{ matrix.spec }}

      - name: Generate Allure report
        if: always()
        run: npx allure generate allure-results -o allure-report --clean

      - name: Upload Allure results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}-results
          path: allure-results
          if-no-files-found: warn

      - name: Upload Allure report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}-report
          path: allure-report
          if-no-files-found: warn

  deploy-pages:
    name: Deploy Allure report to GitHub Pages
    runs-on: ubuntu-latest
    needs: e2e
    if: always()
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download Allure results artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: allure-*-results
          path: ./allure-results
          merge-multiple: true

      - name: Generate combined Allure report
        run: |
          npx allure generate ./allure-results -o ./allure-report --clean

      - name: Upload Allure report to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
