name: WDIO E2E

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  e2e:
    name: E2E (${{ matrix.platform }})
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: android
            spec: src/tests/addbeneficiary.individual.spec.ts
          - platform: ios
            spec: src/tests/virtualcardcreation.spec.ts
    env:
      MB_COUNTRY: ${{ secrets.MB_COUNTRY }}
      MB_PHONE: ${{ secrets.MB_PHONE }}
      MB_PIN: ${{ secrets.MB_PIN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Assumes self-hosted runner has Android SDK/Xcode + devices/emulators configured
      - name: Start Appium
        run: npx appium --base-path / --log-level info &

      - name: Run tests
        run: |
          npm run wdio -- --spec ${{ matrix.spec }}

      - name: Generate Allure report
        if: always()
        run: npx allure generate allure-results -o allure-report --clean

      - name: Upload Allure results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.platform }}
          path: allure-results
          if-no-files-found: warn

      - name: Upload Allure report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ matrix.platform }}
          path: allure-report
          if-no-files-found: warn

  deploy-pages:
    name: Deploy Allure report to GitHub Pages
    runs-on: ubuntu-latest
    needs: e2e
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download Allure results artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: ./allure-results
          merge-multiple: true

      - name: Generate combined Allure report
        run: |
          npx allure generate ./allure-results -o ./allure-report --clean

      - name: Upload Allure report to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
