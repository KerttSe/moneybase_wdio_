name: WDIO E2E

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to run
        required: false
        default: all
        type: choice
        options:
          - all
          - android
          - ios

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  setup:
    name: Build test matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
    steps:
      - name: Build matrix filtered by platform
        id: build
        shell: bash
        env:
          PLATFORM_INPUT: ${{ github.event.inputs.platform || 'all' }}
        run: |
          SPECS=(
            "src/tests/launch.spec.ts"
            "src/tests/homeScreen.spec.ts"
            "src/tests/homeAccountSwitch.spec.ts"
            "src/tests/homeSearch.spec.ts"
            "src/tests/addfunds.spec.ts"
            "src/tests/addbeneficiary.individual.spec.ts"
            "src/tests/physicalcardcreation.spec.ts"
            "src/tests/cardFreezeUnfreeze.joint.spec.ts"
            "src/tests/bankTransfer.p2p.individual.spec.ts"
            "src/tests/bankTransfer.sepa.individual.spec.ts"
            "src/tests/bankTransfer.swift.individual.spec.ts"
            "src/tests/bankTransfer.business.spec.ts"
            "src/tests/fxExchange.spec.ts"
            "src/tests/autoTopUp.spec.ts"
            "src/tests/cashFunds.spec.ts"
            "src/tests/portfolio.spec.ts"
            "src/tests/watchlist.spec.ts"
            "src/tests/orders.spec.ts"
            "src/tests/priceAlerts.spec.ts"
            "src/tests/onboarding.spec.ts"
          )

          PLATFORMS=()
          case "$PLATFORM_INPUT" in
            android) PLATFORMS=("android") ;;
            ios)     PLATFORMS=("ios") ;;
            *)       PLATFORMS=("android" "ios") ;;
          esac

          INCLUDE="[]"
          for platform in "${PLATFORMS[@]}"; do
            for spec in "${SPECS[@]}"; do
              INCLUDE=$(echo "$INCLUDE" | jq -c \
                --arg p "$platform" --arg s "$spec" \
                '. += [{"platform": $p, "spec": $s, "smoke": true}]')
            done
          done

          MATRIX=$(jq -c -n --argjson inc "$INCLUDE" '{"include": $inc}')
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "Selected platform: $PLATFORM_INPUT"
          echo "Jobs to create: $(echo "$INCLUDE" | jq 'length')"

  e2e:
    name: ${{ matrix.smoke && format('SMOKE ({0})', matrix.platform) || format('E2E ({0})', matrix.platform) }} — ${{ matrix.spec }}
    needs: setup
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    env:
      MB_COUNTRY: ${{ secrets.MB_COUNTRY }}
      MB_PHONE: ${{ secrets.MB_PHONE }}
      MB_PIN: ${{ secrets.MB_PIN }}
      BROWSERSTACK: "true"
      BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
      BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
      BS_APP_ANDROID: ${{ secrets.BS_APP_ANDROID }}
      BS_APP_IOS: ${{ secrets.BS_APP_IOS }}
      PLATFORM: ${{ matrix.platform }}
      BS_BUILD: ${{ github.run_id }}-${{ github.run_attempt }}
      BS_BUILD_TAGS: ${{ matrix.spec }},${{ matrix.platform }}
      OTP_FORCE_RESEND_BEFORE_FETCH: "false"
      OTP_FETCH_DELAY_MS: "5000"
      OTP_RESEND_WAIT_MS: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run wdio -- --spec ${{ matrix.spec }}

      - name: Upload Allure results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.platform }}-${{ strategy.job-index }}
          path: allure-results
          if-no-files-found: warn

  deploy-pages:
    name: Deploy Allure report to GitHub Pages
    runs-on: ubuntu-latest
    needs: e2e
    if: always()
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download Allure results artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: ./allure-results
          merge-multiple: true

      - name: Generate combined Allure report
        run: |
          npx -y allure-commandline@2 generate ./allure-results -o ./allure-report --clean

      - name: Upload Allure report to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
